apiVersion: 1

datasources:
  - name: GSW InfluxDB
    uid: gsw-influxdb
    type: influxdb
    access: proxy

    url: $GSW_GRAFANA_INFLUXDB_URL
    jsonData:
      dbName: $GSW_GRAFANA_INFLUXDB_DB_NAME
      httpHeaderName1: Authorization
      httpMode: POST
      version: InfluxQL
    secureJsonData:
      httpHeaderValue1: Token $GSW_GRAFANA_INFLUXDB_TOKEN
